services:
  # Full Stack Web Service (Frontend + Backend)
  - type: web
    name: spendwise-expense-tracker
    env: node
    plan: free
    buildCommand: "npm run install-all && npm run build"
    startCommand: "npm start"
    healthCheckPath: /api
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PORT
        value: 10000
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
